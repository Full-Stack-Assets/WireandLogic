name: Hourly Post Generation

on:
  schedule:
    # Two off-peak ticks per hour. GitHub heavily throttles minute-0 crons
    # (ticks arrive up to an hour late or are silently dropped), which left
    # multi-hour gaps between posts. Off-peak minutes are throttled far less,
    # and the second tick catches hours where the first one is dropped; the
    # freshness gate below keeps output to at most one post per hour.
    - cron: '7,37 * * * *'
  workflow_dispatch:

concurrency:
  group: hourly-post-generation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check whether an hourly post is due
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — running unconditionally."
            exit 0
          fi
          age_min=$(node -e '
            const fs = require("fs");
            let last = 0;
            try {
              const log = JSON.parse(fs.readFileSync("content/.topic-log.json", "utf8"));
              for (const t of log.topics || []) {
                const ts = Date.parse(t.publishedAt);
                if (!Number.isNaN(ts) && ts > last) last = ts;
              }
            } catch {}
            console.log(last ? Math.floor((Date.now() - last) / 60000) : 999999);
          ')
          if [ "${age_min}" -lt 50 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Last post is ${age_min} min old — this hour is already covered; skipping."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Last post is ${age_min} min old — generating."
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
        if: steps.gate.outputs.run == 'true'

      - name: Verify Groq secret
        if: steps.gate.outputs.run == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "${GROQ_API_KEY}" ]; then
            echo "GROQ_API_KEY is not set. Add it in Settings → Secrets and variables → Actions." >&2
            exit 1
          fi

      - name: Run pipeline with Groq
        if: steps.gate.outputs.run == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: npx tsx scripts/run-local.ts

      - name: Commit and push
        if: steps.gate.outputs.run == 'true'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          PRODUCTION_BRANCH: main
        run: |
          git config user.name "trendblog-bot"
          git config user.email "bot@trendblog.dev"

          git config merge.topiclog.name "union topic log entries"
          git config merge.topiclog.driver "node scripts/merge-topic-log.mjs %O %A %B"

          git add content/
          if git diff --cached --quiet; then
            echo "No new post generated — nothing to commit."
            exit 0
          fi

          git commit -m "post: $(date -u +%Y-%m-%dT%H:00Z) hourly dispatch"

          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "Pushed on attempt ${attempt}."
              if [ -n "${VERCEL_DEPLOY_HOOK_URL}" ] && [ "${branch}" = "${PRODUCTION_BRANCH}" ]; then
                echo "Triggering Vercel deploy hook…"
                if curl -fsS -m 30 --retry 3 -X POST "${VERCEL_DEPLOY_HOOK_URL}" >/dev/null; then
                  echo "Vercel redeploy triggered."
                else
                  echo "Vercel deploy hook call failed (non-fatal)." >&2
                fi
              fi
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/${branch} and retrying..."
            git fetch origin "${branch}"
            if ! git rebase "origin/${branch}"; then
              echo "Rebase did not complete cleanly; aborting this attempt." >&2
              git rebase --abort || true
            fi
          done

          echo "Failed to push after multiple attempts." >&2
          exit 1
