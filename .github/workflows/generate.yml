name: Hourly Post Generation

on:
  schedule:
    # Hourly. GitHub may delay scheduled runs under load, so the actual tick can
    # drift a few minutes past the time. When running several sites that share an
    # LLM key/quota, give each a DIFFERENT minute so they don't all hit the API
    # at once (e.g. site 1 '0 * * * *', site 2 '12 * * * *', site 3 '24 …').
    - cron: '0 * * * *'
  workflow_dispatch: # manual trigger button in GitHub UI

# Don't let a slow run overlap the next hourly tick. Newer runs wait for the
# in-flight one rather than racing it to commit/push.
concurrency:
  group: hourly-post-generation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run pipeline
        env:
          # LLM key — name must match `llm.apiKeyEnv` in src/site.config.ts.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          # Syndication (optional) — any unset platform is skipped.
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: npx tsx scripts/run-local.ts

      - name: Commit and push
        env:
          # Optional Vercel Deploy Hook URL (Vercel → Settings → Git → Deploy
          # Hooks). When set, a production redeploy is triggered after each new
          # post is pushed. Unset = skipped (relies on Vercel's git auto-deploy).
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          # The deploy hook targets production; only fire it when pushing here.
          PRODUCTION_BRANCH: main
        run: |
          git config user.name "trendblog-bot"
          git config user.email "bot@trendblog.dev"

          # Register the union merge driver for content/.topic-log.json (mapped
          # in .gitattributes) so a rebase auto-merges concurrent appends to the
          # topic log instead of conflicting and failing the run.
          git config merge.topiclog.name "union topic log entries"
          git config merge.topiclog.driver "node scripts/merge-topic-log.mjs %O %A %B"

          git add content/
          if git diff --cached --quiet; then
            echo "No new post generated — nothing to commit."
            exit 0
          fi

          git commit -m "post: $(date -u +%Y-%m-%dT%H:00Z) hourly dispatch"

          # The remote may have advanced since checkout (concurrent runs,
          # re-runs on a stale SHA, or other merges to main). Rebase onto the
          # latest remote state and retry the push so a moved ref doesn't fail
          # the whole run. The topic-log merge driver resolves the only file
          # that two runs can both touch.
          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "Pushed on attempt ${attempt}."
              # Trigger a Vercel production redeploy for the new post. Non-fatal:
              # the commit is already pushed, so a hook hiccup must not fail the run.
              if [ -n "${VERCEL_DEPLOY_HOOK_URL}" ] && [ "${branch}" = "${PRODUCTION_BRANCH}" ]; then
                echo "Triggering Vercel deploy hook…"
                if curl -fsS -m 30 --retry 3 -X POST "${VERCEL_DEPLOY_HOOK_URL}" >/dev/null; then
                  echo "Vercel redeploy triggered."
                else
                  echo "Vercel deploy hook call failed (non-fatal)." >&2
                fi
              elif [ -n "${VERCEL_DEPLOY_HOOK_URL}" ]; then
                echo "Skipping deploy hook — '${branch}' is not the production branch (${PRODUCTION_BRANCH})."
              else
                echo "VERCEL_DEPLOY_HOOK_URL not set; relying on Vercel git auto-deploy."
              fi
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/${branch} and retrying..."
            git fetch origin "${branch}"
            if ! git rebase "origin/${branch}"; then
              echo "Rebase did not complete cleanly; aborting this attempt." >&2
              git rebase --abort || true
            fi
          done

          echo "Failed to push after multiple attempts." >&2
          exit 1
