name: Daily Post Generation

on:
  schedule:
    # 12:00 UTC = 7am ET during DST, 8am ET standard time
    - cron: '0 12 * * *'
  workflow_dispatch: # manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: npx tsx scripts/run-local.ts

      - name: Commit and push
        run: |
          git config user.name "trendblog-bot"
          git config user.email "bot@trendblog.dev"
          git add content/
          if git diff --cached --quiet; then
            echo "No new post generated — nothing to commit."
            exit 0
          fi

          git commit -m "post: $(date -u +%Y-%m-%d) daily dispatch"

          # The remote may have advanced since checkout (concurrent runs,
          # re-runs on a stale SHA, or other merges to main). Rebase onto the
          # latest remote state and retry the push so a moved ref doesn't fail
          # the whole run.
          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/${branch} and retrying..."
            git fetch origin "${branch}"
            git rebase "origin/${branch}"
          done

          echo "Failed to push after multiple attempts." >&2
          exit 1
