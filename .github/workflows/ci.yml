name: CI

# Runs on every PR and push to main: typecheck, unit tests, and a full
# `next build`. This is the independent guard against the class of incident
# found on 2026-07-03 — a truncated hourly post broke `next build` entirely,
# and scripts/build.sh silently reported success anyway (now fixed with
# `set -e`, but this workflow means a broken build fails loudly here too,
# on every PR, before it ever reaches main).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
