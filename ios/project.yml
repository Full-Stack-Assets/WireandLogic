# XcodeGen spec — an alternative way to (re)generate Dispatch.xcodeproj.
# Install: brew install xcodegen
# Regenerate: cd ios && xcodegen generate
#
# The committed Dispatch.xcodeproj already works; this file just makes the
# project reproducible without hand-editing the pbxproj.
name: Dispatch
options:
  bundleIdPrefix: dev.dispatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Dispatch:
    type: application
    platform: iOS
    sources:
      - Dispatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.dispatch.Dispatch
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
